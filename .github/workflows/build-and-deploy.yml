name: Build and deploy CloudAdmin

permissions:
  contents: write

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag to deploy (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy-pages.yml
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      node-version: '22'
