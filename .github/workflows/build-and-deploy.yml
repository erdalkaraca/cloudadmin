name: Build and deploy CloudAdmin

permissions:
  contents: write

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag to deploy (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  build:
    if: github.event_name == 'push'
    uses: ./.github/workflows/reusable-build.yml
    with:
      node-version: '22'
      set-version: true
      upload-artifacts: false

  deploy:
    needs: [build]
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.build.result == 'success'))
    uses: ./.github/workflows/reusable-deploy-pages.yml
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
      node-version: '22'
